name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build web
        run: npx vite build

  tauri-build:
    name: Tauri Build (${{ matrix.platform }})
    needs: lint-test-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onyx-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
          retention-days: 7

  tauri-build-android:
    name: Tauri Android Build
    needs: lint-test-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Build Android APK (debug)
        run: npx tauri android build --debug
        env:
          VITE_PLATFORM: android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: onyx-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 7

  release:
    name: Release
    needs: [tauri-build, tauri-build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts for debugging
        run: find artifacts -type f | head -100

      - name: Collect release assets
        run: |
          mkdir -p release-assets/

          # Collect all distributable files into a flat folder
          find artifacts -type f \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            -o -name '*.msi' -o -name '*.exe' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \
            -o -name '*.apk' -o -name '*.aab' \
          \) -exec cp {} release-assets/ \;

          echo "=== Release assets ==="
          ls -la release-assets/

          if [ -z "$(ls -A release-assets/)" ]; then
            echo "::warning::No distributable files found"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            **Automated build from [`${{ steps.sha.outputs.short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})**

            Version: `v${{ steps.version.outputs.version }}`
            Branch: `main`
            Run: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Platforms
            - Windows (`.exe`, `.msi`)
            - macOS (`.dmg`)
            - Linux (`.deb`, `.rpm`, `.AppImage`)
            - Android (`.apk`)
          draft: true
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
