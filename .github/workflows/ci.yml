# ─────────────────────────────────────────────────────────────────────
# Onyx CI/CD — Multi-Platform Matrix (3-min wall-clock target)
# ─────────────────────────────────────────────────────────────────────
# Cache strategy:  pnpm store + Rust sccache + Android NDK
# Matrix:          5 platforms run in parallel after frontend gate
# Artifacts:       Signed binaries uploaded with 30-day retention
# ─────────────────────────────────────────────────────────────────────

name: CI/CD Multi-Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

# Cancel in-progress runs on the same branch (saves runner minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job 1 — Frontend gate (lint + test + build)
# Runs once on ubuntu, all platform builds wait for this.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      # Cache the built dist/ so platform jobs skip `pnpm build`
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2 — Tauri multi-platform builds (run in parallel)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: Build ${{ matrix.suffix }}
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Desktop ──
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            artifact: onyx-linux-x64
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            artifact: onyx-macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            suffix: macos-x64
            artifact: onyx-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            artifact: onyx-windows-x64
          # ── Mobile (priority) ──
          - os: ubuntu-latest
            target: aarch64-linux-android
            suffix: android-aarch64
            artifact: onyx-android-aarch64

    steps:
      - uses: actions/checkout@v4

      # ── Download pre-built frontend (skip re-build) ──
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # ── pnpm + Node (for Tauri CLI) ──
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Rust toolchain + cache (2min → 10s on cache hit) ──
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ${{ matrix.suffix }}

      # ── Linux system deps ──
      - name: Install Linux deps
        if: runner.os == 'Linux' && matrix.suffix == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      # ── Android-specific setup (5min → 20s with NDK cache) ──
      - name: Setup Java 17
        if: matrix.suffix == 'android-aarch64'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        if: matrix.suffix == 'android-aarch64'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.suffix == 'android-aarch64'
        run: sdkmanager "ndk;27.0.12077973"

      - name: Set NDK_HOME
        if: matrix.suffix == 'android-aarch64'
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Cache Android NDK
        if: matrix.suffix == 'android-aarch64'
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: android-gradle-

      - name: Initialize Tauri Android
        if: matrix.suffix == 'android-aarch64'
        run: pnpm exec tauri android init

      # ── Android signing ──
      - name: Decode Android keystore
        if: matrix.suffix == 'android-aarch64' && env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/onyx-release.jks
          cat > src-tauri/gen/android/keystore.properties << EOF
          storeFile=onyx-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Replace Tauri-generated build.gradle.kts with our signing-ready template ──
      # gen/ is gitignored → tauri android init generates a DEFAULT build.gradle.kts
      # with NO signing config. We replace it with our tracked template that has
      # keystore loading + signingConfigs already wired up correctly.
      - name: Install signing-ready build.gradle.kts
        if: matrix.suffix == 'android-aarch64'
        run: |
          cp src-tauri/android-build.gradle.kts src-tauri/gen/android/app/build.gradle.kts
          echo "✅ Replaced generated build.gradle.kts with signing-ready template"
          head -20 src-tauri/gen/android/app/build.gradle.kts

      # ── Build (skip beforeBuildCommand — dist already exists) ──
      - name: Build Android
        if: matrix.suffix == 'android-aarch64'
        run: pnpm exec tauri android build --target aarch64
        env:
          VITE_PLATFORM: android

      # ── Manual APK signing (bulletproof — works even if Gradle signing fails) ──
      - name: Sign APK (apksigner)
        if: matrix.suffix == 'android-aarch64' && env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          # Find the release APK (may be unsigned if Gradle signing was skipped)
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -not -name "*debug*" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No release APK found!"
            find src-tauri/gen/android/app/build/outputs/ -type f -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "📦 Found APK: $APK ($(du -h "$APK" | cut -f1))"

          # Get latest build-tools
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)"
          echo "🔧 Using build-tools: $BUILD_TOOLS"

          # Zipalign (required before signing)
          "$BUILD_TOOLS/zipalign" -f -v 4 "$APK" "${APK}.aligned"
          mv "${APK}.aligned" "$APK"

          # Sign with apksigner (v1 + v2 + v3 signatures)
          "$BUILD_TOOLS/apksigner" sign \
            --verbose \
            --ks src-tauri/gen/android/onyx-release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            "$APK"

          # Verify signature
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"

          # Rename if it was unsigned (cosmetic — file IS signed now)
          if [[ "$APK" == *"unsigned"* ]]; then
            SIGNED="${APK//-unsigned/}"
            mv "$APK" "$SIGNED"
            echo "📦 Renamed: $(basename "$SIGNED")"
          fi

          echo "✅ APK signed and verified"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Fail-safe: reject unsigned APKs ──
      - name: Verify APK is signed (fail-safe)
        if: matrix.suffix == 'android-aarch64'
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -not -name "*debug*" -not -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ FATAL: No signed APK found after build+sign pipeline!"
            find src-tauri/gen/android/app/build/outputs/ -type f 2>/dev/null || true
            exit 1
          fi
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools/" | sort -V | tail -1)"
          "$BUILD_TOOLS/apksigner" verify "$APK" || { echo "❌ FATAL: APK signature verification FAILED"; exit 1; }
          echo "✅ Signed APK verified: $(basename "$APK") ($(du -h "$APK" | cut -f1))"

      - name: Build Desktop
        if: matrix.suffix != 'android-aarch64'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple codesigning disabled for dev builds (signingIdentity: null in tauri.conf.json)
          # Re-enable these when Apple Developer certificates are configured:
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm exec tauri
          args: --target ${{ matrix.target }}

      # ── Upload artifacts ──
      - name: Upload Desktop artifacts
        if: matrix.suffix != 'android-aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**
          retention-days: 30

      - name: Upload Android APK
        if: matrix.suffix == 'android-aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          retention-days: 30

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3 — Auto-release on main (draft GitHub Release)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release:
    name: Draft Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets/
          find artifacts -type f \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            -o -name '*.msi' -o -name '*.exe' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \
            -o -name '*.apk' -o -name '*.aab' \
          \) -exec cp {} release-assets/ \;
          echo "=== Release assets ===" && ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Onyx Build #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          body: |
            **Automated build from [`${{ steps.sha.outputs.short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})**

            Version: `v${{ steps.version.outputs.version }}`
            Branch: `main`

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `.exe` / `.msi` |
            | macOS    | `.dmg` |
            | Linux    | `.deb` / `.rpm` / `.AppImage` |
            | Android  | `.apk` (signed) |
          draft: true
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
